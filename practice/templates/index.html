<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>大学マップ</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- 検索バー -->
    <div class="search-bar">

        <input
            type="text"
            id="searchInput"
            list="buildingList"
            placeholder="🔍建物コードを入力">

        <datalist id="buildingList"></datalist>

    </div>

    <div class="container">

        <!-- 地図 -->
        <div class="map-area">

            <div class="map-container">

              <picture>
    <!-- スマホ版 -->
    <source
        media="(max-width: 768px) and (orientation: portrait)"
        srcset="{{ url_for('static', filename='campusmap-mobile.png') }}">

    <!-- PC版 -->
    <img
        src="{{ url_for('static', filename='campusmap.jpg') }}"
        id="map"
        class="map-image"
        alt="京都橘大学キャンパスマップ">
</picture>
            </div>

        </div>

    </div>

    <!-- ==========================
         建物情報ポップアップ
    =========================== -->

    <div id="popup-overlay" class="popup-overlay">

        <div class="popup-card">

            <button id="close-popup" class="close-btn">
                ×
            </button>

            <h2 id="building-name">
                建物名
            </h2>

 <div class="photo-slider">

    <button id="prev-photo" class="slide-btn">
        ◀
    </button>

    <img
        id="building-photo"
        class="building-photo"
        src=""
        alt="建物写真">

    <button id="next-photo" class="slide-btn">
        ▶
    </button>

</div>
            <p id="building-description">
                建物説明
            </p>

        </div>

    </div>

    <script src="{{ url_for('static', filename='buildingData.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
